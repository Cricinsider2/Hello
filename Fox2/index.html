<!DOCTYPE html><html><head>


  <meta charset="UTF-8">
  <title>Matches Links · FootyFeed</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  
  <style type="text/css">* {user-select: auto !important; -webkit-user-select: auto !important;}</style><input type="hidden" id="inject_idm_text_selection">
  
  
  
  <style type="text/css">
    body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
      background-color: #000;
    }

    video {
      width: 100%;
      height: 100%;
      background-color: #000;
    }

    /* Show default video controls */
    video::-webkit-media-controls {
      display: flex !important;
    }

    video::-webkit-media-controls-panel {
      display: flex !important;
    }

    #myLogo {
      width: 60px;
      height: 40px;
      position: absolute;
      right: 5px;
      top: 10px;
      z-index: 1000;
      pointer-events: none;
    }

    /* Quality selector panel */
    .quality-panel {
      position: absolute;
      top: 10px;
      right: 70px;
      z-index: 1000;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      background: rgba(0, 0, 0, 0.7);
      padding: 8px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .quality-btn {
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
      min-width: 50px;
      text-align: center;
    }

    .quality-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .quality-btn.active {
      background: #ff0000;
      color: white;
    }

    /* Match info panel */
    .match-info {
      position: absolute;
      bottom: 60px;
      left: 10px;
      z-index: 1000;
      background: rgba(0,0,0,0.7);
      padding: 10px 15px;
      border-radius: 5px;
      font-size: 14px;
      border-left: 3px solid #ff0000;
      max-width: 400px;
    }

    .match-title {
      font-weight: bold;
      margin-bottom: 3px;
      font-size: 16px;
    }

    .match-tournament {
      font-size: 12px;
      opacity: 0.8;
    }

    /* Loading indicator */
    .custom-loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 16px;
      background: rgba(0,0,0,0.7);
      padding: 15px 25px;
      border-radius: 30px;
      z-index: 2000;
      display: none;
    }

    .custom-loading.visible {
      display: block;
    }

    /* Error message */
    .error-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff4444;
      font-size: 16px;
      background: rgba(0,0,0,0.8);
      padding: 20px 30px;
      border-radius: 10px;
      z-index: 2000;
      text-align: center;
      border: 1px solid #ff4444;
      max-width: 80%;
    }

    @media (max-width: 768px) {
      .quality-panel {
        right: 10px;
        left: 10px;
        top: 10px;
        justify-content: center;
      }
      
      .match-info {
        bottom: 60px;
        max-width: calc(100% - 20px);
      }
    }

    /* --- Telegram Popup (modal) & confirmation dialog --- */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      backdrop-filter: blur(6px);
      background: rgb(0 0 0 / 0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      animation: fadeIn 0.5s ease;
    }
    .modal-content {
      background: rgb(255 255 255 / 0.05);
      border: 1px solid rgb(255 255 255 / 0.1);
      border-radius: 20px;
      padding: 30px 25px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      color: #f3f4f6;
      box-shadow: 0 8px 32px rgb(0 0 0 / 0.4);
      backdrop-filter: blur(12px);
      transform: scale(0.95);
      animation: scaleIn 0.4s ease forwards;
    }
    .modal-content h2 {
      font-size: 24px;
      font-weight: 700;
      color: #facc15;
      margin-bottom: 16px;
    }
    .modal-content p {
      font-size: 16px;
      color: #d1d5db;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .modal-content strong {
      color: #fff;
    }
    .modal-content button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.3s;
    }
    #joinButton {
      background: linear-gradient(to right, #3b82f6, #06b6d4);
      color: #fff;
      font-weight: 500;
    }
    #joinButton:hover {
      background: linear-gradient(to right, #2563eb, #0891b2);
      transform: scale(1.02);
    }
    #closeButton {
      background: rgb(255 255 255 / 0.1);
      color: #f3f4f6;
    }
    #closeButton:hover {
      background: rgb(255 255 255 / 0.15);
      transform: scale(1.02);
    }
    /* Confirmation dialog (simple inline replacement) */
    .confirm-dialog {
      background: rgb(20 20 30 / 0.9);
      border: 1px solid #facc15;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      text-align: center;
    }
    .confirm-dialog p {
      color: #fff;
      font-size: 16px;
      margin-bottom: 20px;
    }
    .confirm-dialog button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 15px;
      margin: 0 8px;
      cursor: pointer;
      min-width: 100px;
    }
    .confirm-dialog button:hover {
      background: #2563eb;
    }
    .confirm-dialog button:last-child {
      background: rgb(255 255 255 / 0.2);
    }
    .confirm-dialog button:last-child:hover {
      background: rgb(255 255 255 / 0.3);
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>

</body></html>
