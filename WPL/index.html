<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.plyr.io/3.6.2/plyr.css">
    <script src="https://cdn.plyr.io/3.6.3/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
        }

        .plyr {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

<video id="player" autoplay controls playsinline></video>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const params = new URLSearchParams(window.location.search);
    const streamUrl = params.get("embed");

    if (!streamUrl) {
        document.body.innerHTML =
            '<div style="color:white;text-align:center;padding-top:50px;">No stream URL provided</div>';
        return;
    }

    const video = document.getElementById("player");
    const options = {};

    if (Hls.isSupported()) {

        const hls = new Hls({
            maxMaxBufferLength: 100
        });

        hls.loadSource(streamUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {

            const qualities = [
                ...new Set(
                    hls.levels
                        .map(level => level.height)
                        .filter(Boolean)
                )
            ];

            options.quality = {
                default: qualities[0],
                options: qualities,
                forced: true,

                onChange: quality => {
                    hls.levels.forEach((level, index) => {
                        if (level.height === quality) {
                            hls.currentLevel = index;
                        }
                    });
                }
            };

            new Plyr(video, options);
            video.play().catch(() => {});
        });

        window.hls = hls;

    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {

        video.src = streamUrl;
        new Plyr(video, options);

    } else {
        document.body.innerHTML =
            '<div style="color:white;text-align:center;padding-top:50px;">HLS playback is not supported</div>';
    }
});
</script>

</body>
</html>
