<script>

(function(){


/* ==========================
   ELEMENTS
========================== */

const video =

document.getElementById("player");


const container =

document.getElementById("player-container");


const loading =

document.getElementById("loading-overlay");


const message =

document.getElementById("player-message");


const messageTitle =

document.getElementById("message-title");


const messageSub =

document.getElementById("message-sub");


let hls = null;

let player = null;

let networkRecovery = 0;

let mediaRecovery = 0;



/* ==========================
   SANDBOX DETECTION
========================== */

function isSandboxedEnv(){

try{


/* Normal direct page */

if(window.self === window.top){

return false;

}


/* Direct sandbox attribute detection */

try{

const frame = window.frameElement;

if(frame){

const sandbox =

frame.getAttribute("sandbox");

if(sandbox !== null){

return true;

}

}

}catch(e){

/*

Cross-origin frame access blocked.

This alone does not always mean sandbox,

so continue with further checks.

*/

}


/* Test important browser capabilities */

try{

const test =

window.open(

"",

"_blank",

"width=1,height=1"

);

if(test){

test.close();

}

}catch(e){

return true;

}


return false;


}catch(e){

return true;

}

}



/* ==========================
   BLOCK SCREEN
========================== */

function triggerBlockScreen(

title,

text

){

try{

if(hls){

hls.destroy();

hls = null;

}

}catch(e){}


try{

if(player){

player.destroy();

}

}catch(e){}


try{

video.pause();

video.removeAttribute("src");

video.load();

}catch(e){}


if(container){

container.style.display = "none";

}


const overlay =

document.createElement("div");


overlay.className =

"block-overlay";


overlay.id =

"sandbox-block-display";


overlay.innerHTML = `

<div class="block-box">

<div class="block-icon">

⚠

</div>

<div class="block-title">

${title}

</div>

<div class="block-sub">

${text}

</div>

</div>

`;


document.body.appendChild(overlay);

}



/* ==========================
   RUN SANDBOX CHECK
========================== */

if(isSandboxedEnv()){

triggerBlockScreen(

"Disable Sandbox",

"Open this page directly in Chrome browser and disable any ad blocker before playing the stream."

);

return;

}



/* ==========================
   URL PARAMETER
========================== */

function getParam(name){

const url =

new URL(window.location.href);

return url.searchParams.get(name);

}


const stream =

getParam("embed");



/* ==========================
   UI FUNCTIONS
========================== */

function hideLoading(){

loading.classList.add("hidden");

}


function showLoading(){

loading.classList.remove("hidden");

}


function showMessage(

title,

text

){

hideLoading();

messageTitle.textContent = title;

messageSub.textContent = text;

message.classList.add("show");

}



/* ==========================
   VALIDATE STREAM
========================== */

if(!stream){

showMessage(

"No Stream Found",

"Please provide a valid stream using the embed URL parameter."

);

return;

}



/* ==========================
   PLAYER SETUP
========================== */

function createPlayer(

qualityOptions = [0]

){

if(player){

return;

}


player = new Plyr(

video,

{

autoplay:true,

controls:[

'play-large',

'play',

'mute',

'volume',

'current-time',

'settings',

'pip',

'fullscreen'

],

settings:[

'quality',

'speed'

],

quality:{

default:0,

options:qualityOptions,

forced:true,

onChange:function(q){

if(!hls){

return;

}


if(q === 0){

hls.currentLevel = -1;

return;

}


const levelIndex =

hls.levels.findIndex(

level => level.height === q

);


if(levelIndex !== -1){

hls.currentLevel =

levelIndex;

}

}

}

}

);


player.on(

"playing",

hideLoading

);


player.on(

"waiting",

showLoading

);


player.on(

"stalled",

showLoading

);

}



/* ==========================
   HLS PLAYBACK
========================== */

if(

window.Hls &&

Hls.isSupported()

){

hls = new Hls({

enableWorker:true,

lowLatencyMode:true,

backBufferLength:30,

maxBufferLength:30,

maxMaxBufferLength:60,

startLevel:-1,

capLevelToPlayerSize:true

});


hls.loadSource(stream);

hls.attachMedia(video);



/* MANIFEST READY */

hls.on(

Hls.Events.MANIFEST_PARSED,

function(){

const qualities =

[

...new Set(

hls.levels

.map(level => level.height)

.filter(Boolean)

)

]

.sort(

(a,b) => b-a

);


createPlayer(

[0,...qualities]

);


hideLoading();


video.play()

.catch(function(){

/*

Autoplay can be blocked.

Plyr play button remains available.

*/

});

}

);



/* ERROR RECOVERY */

hls.on(

Hls.Events.ERROR,

function(event,data){

if(!data.fatal){

return;

}


switch(data.type){


case Hls.ErrorTypes.NETWORK_ERROR:


if(networkRecovery < 3){

networkRecovery++;

showLoading();

setTimeout(function(){

hls.startLoad();

},1000);

}else{

showMessage(

"Network Error",

"The stream server is not responding. Please try again later."

);

}

break;



case Hls.ErrorTypes.MEDIA_ERROR:


if(mediaRecovery < 3){

mediaRecovery++;

hls.recoverMediaError();

}else{

showMessage(

"Playback Error",

"The browser could not decode this stream."

);

}

break;



default:


hls.destroy();

showMessage(

"Stream Error",

"The live stream could not be loaded."

);

break;

}

}

);



/* RESET RECOVERY COUNTERS */

hls.on(

Hls.Events.FRAG_LOADED,

function(){

networkRecovery = 0;

mediaRecovery = 0;

}

);


}



/* ==========================
   NATIVE HLS
========================== */

else if(

video.canPlayType(

'application/vnd.apple.mpegurl'

)

){

video.src = stream;


createPlayer();


video.addEventListener(

"loadedmetadata",

function(){

hideLoading();

video.play().catch(()=>{});

}

);


video.addEventListener(

"error",

function(){

showMessage(

"Stream Error",

"The live stream could not be played."

);

}

);

}



/* ==========================
   UNSUPPORTED BROWSER
========================== */

else{

showMessage(

"Browser Not Supported",

"This browser does not support HLS video playback."

);

}



/* ==========================
   CLEANUP
========================== */

window.addEventListener(

"beforeunload",

function(){

try{

if(hls){

hls.destroy();

}

}catch(e){}

}

);


})();

</script>
